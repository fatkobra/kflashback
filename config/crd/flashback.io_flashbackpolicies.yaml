apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: flashbackpolicies.flashback.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: flashback.io
  names:
    kind: FlashbackPolicy
    listKind: FlashbackPolicyList
    plural: flashbackpolicies
    singular: flashbackpolicy
    shortNames:
      - fbp
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Tracked
          type: integer
          jsonPath: .status.trackedResources
        - name: Revisions
          type: integer
          jsonPath: .status.totalRevisions
        - name: Storage
          type: string
          jsonPath: .status.storageUsed
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: FlashbackPolicy defines which Kubernetes resources should be tracked and how their history should be stored.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                resources:
                  type: array
                  minItems: 1
                  description: Resources is the list of Kubernetes resource types to track.
                  items:
                    type: object
                    required:
                      - apiVersion
                      - kind
                    properties:
                      apiVersion:
                        type: string
                        description: API version of the resource (e.g., "apps/v1", "v1").
                      kind:
                        type: string
                        description: Resource kind (e.g., "Deployment", "Service").
                      namespaces:
                        type: array
                        description: Limit tracking to specific namespaces. Empty means all.
                        items:
                          type: string
                      excludeNamespaces:
                        type: array
                        description: Exclude specific namespaces from tracking.
                        items:
                          type: string
                      labelSelector:
                        type: object
                        description: Filter resources by labels.
                        properties:
                          matchLabels:
                            type: object
                            additionalProperties:
                              type: string
                          matchExpressions:
                            type: array
                            items:
                              type: object
                              properties:
                                key:
                                  type: string
                                operator:
                                  type: string
                                values:
                                  type: array
                                  items:
                                    type: string
                      excludeNames:
                        type: array
                        description: Exclude specific resource names.
                        items:
                          type: string
                      includeNames:
                        type: array
                        description: Only track specific resource names.
                        items:
                          type: string
                retention:
                  type: object
                  description: Configures how long history is kept.
                  properties:
                    maxAge:
                      type: string
                      default: "720h"
                      description: Maximum duration to retain history (e.g., "720h" for 30 days).
                    maxRevisions:
                      type: integer
                      default: 1000
                      minimum: 1
                      description: Maximum revisions per resource.
                storage:
                  type: object
                  description: Storage optimization settings.
                  properties:
                    snapshotEvery:
                      type: integer
                      default: 20
                      minimum: 1
                      description: Store a full snapshot every N revisions.
                    compressSnapshots:
                      type: boolean
                      default: true
                      description: Enable gzip compression for full snapshots.
                fieldConfig:
                  type: object
                  description: Field filtering configuration.
                  properties:
                    ignoreFields:
                      type: array
                      description: JSON paths to ignore when detecting changes.
                      items:
                        type: string
                    includeFields:
                      type: array
                      description: Only track changes to these fields. Empty means all.
                      items:
                        type: string
                    trackStatus:
                      type: boolean
                      default: false
                      description: Whether to track .status changes.
                tracking:
                  type: object
                  description: Event type tracking configuration.
                  properties:
                    creations:
                      type: boolean
                      default: true
                      description: Track resource creation events.
                    updates:
                      type: boolean
                      default: true
                      description: Track resource update events.
                    deletions:
                      type: boolean
                      default: true
                      description: Track resource deletion events.
                paused:
                  type: boolean
                  default: false
                  description: Stops all tracking when true.
              required:
                - resources
            status:
              type: object
              properties:
                trackedResources:
                  type: integer
                totalRevisions:
                  type: integer
                storageUsed:
                  type: string
                storageUsedBytes:
                  type: integer
                lastReconcileTime:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                    required:
                      - type
                      - status
                      - reason
                      - message
                      - lastTransitionTime
                resourceSummaries:
                  type: array
                  items:
                    type: object
                    properties:
                      apiVersion:
                        type: string
                      kind:
                        type: string
                      count:
                        type: integer
                      revisions:
                        type: integer
