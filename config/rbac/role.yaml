apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kflashback-controller
  labels:
    app.kubernetes.io/name: kflashback
    app.kubernetes.io/component: controller
rules:
  # FlashbackPolicy CRD access
  - apiGroups: ["flashback.io"]
    resources: ["flashbackpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["flashback.io"]
    resources: ["flashbackpolicies/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["flashback.io"]
    resources: ["flashbackpolicies/finalizers"]
    verbs: ["update"]

  # KFlashbackConfig CRD access
  - apiGroups: ["flashback.io"]
    resources: ["kflashbackconfigs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["flashback.io"]
    resources: ["kflashbackconfigs/status"]
    verbs: ["get", "update", "patch"]

  # Read access to all resources for tracking
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets", "persistentvolumeclaims", "serviceaccounts", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch"]

  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
